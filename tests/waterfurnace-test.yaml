# CI compilation test — exercises ALL entity code paths.
# Ensures every Python to_code() block and C++ setter compiles correctly.
# Does NOT require secrets, WiFi, or real hardware.

esphome:
  name: waterfurnace-test
  friendly_name: "WaterFurnace Test"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG
  baud_rate: 0

# Minimal networking stub so ESPHome is happy
wifi:
  ssid: "test_ssid"
  password: "test_password"
  manual_ip:
    static_ip: 192.168.1.100
    gateway: 192.168.1.1
    subnet: 255.255.255.0

api:
  encryption:
    key: "1Mxas/2HUGgdfNx8it2J8fw2JvHmrvHz4YE7LLOpdJE="
  custom_services: true

ota:
  - platform: esphome

external_components:
  - source:
      type: local
      path: ../components

uart:
  id: mod_bus
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 19200
  parity: EVEN
  stop_bits: 1

waterfurnace_aurora:
  id: aurora
  uart_id: mod_bus
  address: 1
  update_interval: 10s
  flow_control_pin: GPIO4
  connected:
    name: "Test Heat Pump Connected"
  connected_timeout: 30s

# --- Water Heater (DHW) ---
water_heater:
  - platform: waterfurnace_aurora
    id: aurora_dhw
    name: "Test Domestic Hot Water"
    aurora_id: aurora

# --- Climate (main thermostat + IZ2 zone with diagnostics) ---
climate:
  - platform: waterfurnace_aurora
    id: aurora_thermostat
    name: "Test Heat Pump"
    aurora_id: aurora
  - platform: waterfurnace_aurora
    id: aurora_zone2
    name: "Test Zone 2"
    aurora_id: aurora
    zone: 2
    zone_priority:
      name: "Test Zone 2 Priority"
    zone_size:
      name: "Test Zone 2 Size"
    zone_normalized_size:
      name: "Test Zone 2 Normalized Size"

# --- Switch ---
switch:
  - platform: waterfurnace_aurora
    aurora_id: aurora
    dhw_enabled:
      name: "Test DHW Enabled"
    test_mode:
      name: "Test Test Mode"

# --- Number controls ---
number:
