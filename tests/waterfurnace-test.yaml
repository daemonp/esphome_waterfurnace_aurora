    aurora_id: aurora
    dhw_setpoint:
      name: "Test DHW Setpoint"
    blower_only_speed:
      name: "Test Indoor Blower Only Speed"
    lo_compressor_speed:
      name: "Test Lo Compressor Speed"
    hi_compressor_speed:
